<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>赛博抽抽机 · 设置</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="setTitle">📺 赛博抽抽机 · 设置</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="channels"></button>
      <button class="tab" data-tab="focus"></button>
      <button class="tab" data-tab="appearance"></button>
      <button class="tab" data-tab="general"></button>
    </nav>
  </header>

  <main class="scroll">
    <section class="page" data-page="channels">
      <div class="sec-head">
        <h2 id="secChannels"></h2>
        <button id="addChannel" class="ghost"></button>
      </div>
      <div id="channelList"></div>
    </section>

    <section class="page" data-page="focus" hidden>
      <h2 id="secFocus"></h2>
      <div id="focusBox"></div>
    </section>

    <section class="page" data-page="appearance" hidden>
      <h2 id="secThemes"></h2>
      <div id="themeRow" class="theme-row"></div>
      <h2 id="secDiy" style="margin-top: 22px;"></h2>
      <div id="diyBox"></div>
    </section>

    <section class="page" data-page="general" hidden>
      <h2 id="secGeneral"></h2>
      <div id="generalBox"></div>
    </section>
  </main>

  <div class="footer">
    <span id="status" class="status"></span>
    <button id="saveBtn" class="primary"></button>
  </div>

  <script src="data.js"></script>
  <script src="settings.js"></script>
</body>
</html>
